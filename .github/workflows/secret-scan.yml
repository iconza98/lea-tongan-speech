name: secret-scan

# Enforces CONTRIBUTING.md hard rule #1 (never commit secrets) with gitleaks.
# Config + allowlist for the public Firebase browser key live in .gitleaks.toml.
on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  gitleaks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0 # full history so gitleaks scans every commit, not just the tip
      - name: Run gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
